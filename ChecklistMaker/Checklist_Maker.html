<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checklist Maker</title>
    <link rel="icon" href="assets/favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="styles.css">
    <script src="script.js"></script>
</head>
<body onload="formControl()">

    <!-- Checklist Table -->
    <table id="checklistTable">
        <thead>
            <tr>
                <th><h2 id="th1"><input type="text" placeholder="Checklist Title" id="checkTitle"></h2></th>
                <th></th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td id="td1" class="col1"><p id="p1"><input type="text" name="itemName" id="itemName" placeholder="Item 1..."></p></td>
                <td class="col2">
                    <input type="checkbox" class="checkbox" id="checkbox0">
                    <input type="button" value="&#43" class="addButton" onclick="addBox()" id="btnAdd1">
                    <input type="button" value="&#8722" class="removeButton" onclick="removeBox()" id="btnRemove1">
                </td>
            </tr>
        </tbody>
    </table>
    <div id="controlBtnContainer">
        <input type="button" id="importBtn" value="Import Checklist" onclick="importChecklist()">
        <input type="button" id="exportBtn" value="Export Checklist" onclick="exportChecklist()">
        <input type="button" id="printBtn" value="Print Checklist" onclick="window.print()">
        <input type="button" id="clearBtn" value="Clear Checklist" onclick="clearTable()">
    </div>

    <!-- Template Builder -->
    <div class="templateBuilder">
        <h3>Template Builder</h3><br>
        Number of rows (Full page = 20 rows): <br>
        <input type="number" id="numRows" min="1">
        <br><br>
        Checkboxes per row (you can add more later; up to 15 per row.): <br>
        <input type="number" id="checkboxesPerRow" min="1" max="15">
        <br><br>
        Hit enter to generate checklist!
    </div>
</body>
</html>
