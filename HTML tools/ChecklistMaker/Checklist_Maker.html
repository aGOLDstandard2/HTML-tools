<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checklist Maker</title>
    <link rel="icon" href="assets/favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="styles.css">
    <script src="script.js"></script>
</head>
<body onload="formControl()">

    <!-- Checklist Table -->
    <table id="checklistTable">
        <thead>
            <tr>
                <th><h2 id="th1"><input type="text" placeholder="Checklist Title" id="checkTitle"></h2></th>
                <th></th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td class="col1"><p id="p1"><input type="text" name="itemName" id="itemName" placeholder="Item 1..."></p></td>
                <td class="col2">
                    <input type="button" value="&#43" class="checkButton" onclick="addBox()" id="btn1">
                    <input type="checkbox" class="checkbox">
                </td>
            </tr>
        </tbody>
    </table>
    <div id="printBtnContainer">
        <input type="button" id="printBtn" value="Print Checklist" onclick="window.print()">
    </div>

    <!-- Template Builder -->
    <div class="templateBuilder">
        <h4>Template Builder</h4>
        Number of rows (Full page = 20 rows): <br>
        <input type="number" id="numRows" min="1">
        <br><br>
        Checkboxes per row (you can add more later): <br>
        <input type="number" id="checkboxesPerRow" min="1" max="5">
        <br><br>
        Hit enter to generate checklist!
    </div>
</body>
</html>
